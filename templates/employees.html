{% extends "base.html" %}
{% block title %}Сотрудники — Storylove{% endblock %}
{% block content %}
<div x-data="{ employees: [], error: '' }" x-init="fetch('/api/employees').then(r=>r.json()).then(j=>{if(j.success) employees=j.data.employees||[]; else error=j.error||''}).catch(e=>error=String(e))" x-cloak>
  <h1 class="text-3xl font-bold text-gray-900 mb-6">Сотрудники</h1>
  <p class="text-red-600 text-sm mb-4" x-show="error" x-text="error"></p>
  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="min-w-full">
      <thead class="bg-gray-50"><tr><th class="px-4 py-2 text-left text-xs text-gray-500">ID</th><th class="px-4 py-2 text-left text-xs text-gray-500">ФИО</th><th class="px-4 py-2 text-left text-xs text-gray-500">Username</th></tr></thead>
      <tbody>
        <template x-for="e in employees" :key="e.userId">
          <tr class="border-t"><td class="px-4 py-2" x-text="e.userId"></td><td class="px-4 py-2 font-medium" x-text="e.fullName"></td><td class="px-4 py-2 text-gray-500" x-text="e.username || e.name || '—'"></td></tr>
        </template>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
